# Render Blueprint — deploys PostgreSQL + Web Service together
# Dashboard → New → Blueprint → connect nhussainwlv/sciencehub

databases:
  - name: sciencehub-db
    databaseName: science_hub
    plan: free
    region: frankfurt

services:
  - type: web
    name: sciencehub
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: sciencehub-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://sciencehub.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://sciencehub.onrender.com
      - key: NEXT_PUBLIC_APP_NAME
        value: Science Hub
      - key: OPENAI_API_KEY
        sync: false
