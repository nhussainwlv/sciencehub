services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sciencehub
      POSTGRES_PASSWORD: sciencehub
      POSTGRES_DB: science_hub
    ports:
      - "5432:5432"
    volumes:
      - science_hub_pg:/var/lib/postgresql/data

volumes:
  science_hub_pg:
